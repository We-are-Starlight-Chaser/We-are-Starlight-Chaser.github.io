<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | We Are Starlight Chaser</title>
    <meta name="description" content="页面未找到 - We Are Starlight Chaser">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- 引入主样式 -->
    <link rel="stylesheet" href="../css/main.css">

    <style>
        /* 404 页面专用样式 */
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            position: relative;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 700;
            background: linear-gradient(135deg, #EADDFF 0%, #9B7BFF 50%, #6750A4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            color: var(--md-on-surface);
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 1.125rem;
            color: var(--md-on-surface-variant);
            margin-bottom: 32px;
            max-width: 500px;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-illustration {
            width: 200px;
            height: 200px;
            margin-bottom: 32px;
            opacity: 0.8;
        }

        .error-illustration .material-icons {
            font-size: 200px;
            background: linear-gradient(135deg, var(--md-primary), #9B7BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body>
    <!-- 星空背景 Canvas -->
    <canvas id="starfield"></canvas>

    <!-- 错误页面内容 -->
    <div class="error-container">
        <!-- 插图 -->
        <div class="error-illustration">
            <span class="material-icons">travel_explore</span>
        </div>

        <!-- 错误代码 -->
        <div class="error-code">404</div>

        <!-- 错误标题 -->
        <h1 class="error-title">页面未找到</h1>

        <!-- 错误信息 -->
        <p class="error-message">
            抱歉，您访问的页面似乎不存在或已被移动。<br>
            请检查 URL 是否正确，或返回首页继续浏览。
        </p>

        <!-- 操作按钮 -->
        <div class="error-actions">
            <a href="../index.html" class="btn btn-filled">
                <span class="material-icons">home</span>
                返回首页
            </a>
            <a href="https://github.com/We-Are-Starlight-Chaser" class="btn btn-outline" target="_blank">
                <span class="material-icons">code</span>
                访问 GitHub
            </a>
        </div>
    </div>

    <!-- jQuery 库 -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- 通用函数脚本 -->
    <script src="../js/geu_functions.js"></script>

    <!-- 主逻辑脚本 -->
    <script src="../js/main.js"></script>
</body>

</html>
